<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GHOSTLINE ELITE V3</title>
    <style>
        :root {
            --bg: #0b0d0f;
            --card: #161a1d;
            --accent: #ff4d00;
            --accent-glow: rgba(255, 77, 0, 0.4);
            --text: #ffffff;
            --dim: #a0a0a0;
            --success: #00ff88;
            --blue: #3498db;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            padding-bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 450px; }

        h1 {
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 10px 0;
            color: var(--accent);
            text-align: center;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* Блок статуса и добавок */
        .top-panel {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .stat-card {
            background: var(--card);
            padding: 10px 5px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-card.urgent {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(255, 77, 0, 0.15);
        }

        .supps-card {
            background: var(--card);
            padding: 12px;
            border-radius: 12px;
            grid-column: span 3;
            border: 1px solid #333;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .supp-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: bold;
        }

        .supp-check {
            width: 24px;
            height: 24px;
            border: 2px solid var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .supp-check.active { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

        .stat-val { font-size: 20px; font-weight: 900; color: var(--success); display: block; }
        .stat-val.fire { color: var(--accent); text-shadow: 0 0 8px var(--accent-glow); }
        .stat-label { font-size: 9px; color: var(--dim); text-transform: uppercase; margin-top: 2px; }

        /* Тренировка */
        .workout-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
            padding: 0 5px;
        }

        .workout-card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .exercise {
            margin-bottom: 20px;
            position: relative;
        }

        .ex-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .ex-name-row { display: flex; align-items: center; gap: 8px; }
        .ex-name { font-weight: 700; font-size: 15px; }
        
        .help-btn {
            background: #333;
            color: var(--dim);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
        }

        .ex-reps { color: var(--accent); font-weight: 800; font-size: 14px; }

        .sets-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .set-btn {
            width: 42px;
            height: 40px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: 0.2s;
        }
        .set-btn.done { background: var(--success); border-color: var(--success); color: #000; }

        /* Описание упражнения */
        .desc-box {
            display: none;
            background: #252a30;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 12px;
            line-height: 1.4;
            color: #ccc;
            border-left: 3px solid var(--accent);
        }

        /* Вода */
        .water-section {
            margin-top: 20px;
            background: var(--card);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #222;
        }

        .water-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            margin-top: 12px;
        }

        .glass {
            height: 35px;
            border: 2px solid var(--blue);
            border-radius: 6px;
            transition: 0.3s;
        }

        .glass.full { background: var(--blue); box-shadow: 0 0 10px rgba(52, 152, 219, 0.5); }

        .finish-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 18px;
            margin-top: 25px;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px var(--accent-glow);
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: 0.5s;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>GHOSTLINE ELITE</h1>

    <div class="top-panel">
        <div class="stat-card">
            <span class="stat-val" id="streak">0</span>
            <span class="stat-label">Винстрик</span>
        </div>
        <div class="stat-card urgent">
            <span class="stat-val fire" id="days-to-summer">--</span>
            <span class="stat-label">До лета (дней)</span>
        </div>
        <div class="stat-card">
            <span class="stat-val" id="today-name">--</span>
            <span class="stat-label">Сегодня</span>
        </div>
        
        <div class="supps-card">
            <div class="supp-item" onclick="toggleSupp('vitamins')">
                <div class="supp-check" id="check-vitamins"></div>
                Витамины
            </div>
            <div class="supp-item" onclick="toggleSupp('creatine')">
                <div class="supp-check" id="check-creatine"></div>
                Креатин
            </div>
        </div>
    </div>

    <div class="workout-header">
        <div style="font-weight: bold; font-size: 18px;">План на сегодня</div>
        <div id="progress-text" style="color: var(--success); font-size: 14px; font-weight: bold;">0%</div>
    </div>
    <div class="progress-container"><div class="progress-fill" id="progress-bar"></div></div>

    <div class="workout-card" id="workout-area" style="margin-top: 15px;"></div>

    <div class="water-section">
        <div class="stat-label" style="text-align: center;">Вода (Цель: 3.2л / 16 стаканов)</div>
        <div class="water-grid" id="water-grid"></div>
    </div>

    <button class="finish-btn" onclick="finishWorkout()">ЗАВЕРШИТЬ ТРЕНИРОВКУ</button>
</div>

<script>
    const descriptions = {
        'Подтягивания (Классика)': 'Хват чуть шире плеч. Тянись грудью к перекладине. Внизу полностью выпрямляй руки. Без рывков.',
        'Обратный хват (Бицепс)': 'Ладони смотрят на тебя. Хват узкий. Максимально прожимай бицепс в верхней точке.',
        'Алмазные отжимания': 'Руки вместе так, чтобы большие и указательные пальцы касались (ромб). Локти прижаты к телу. Убивает трицепс.',
        'Взрывные приседания': 'Садись плавно до параллели, выпрыгивай вверх максимально мощно. Приземляйся на мягкие ноги.',
        'Отжимания (Ноги выше)': 'Ноги на диван/стул, руки на пол. Чем выше ноги, тем больше грузит верх груди. Делай до касания носом пола.',
        'Широкие отжимания': 'Руки шире плеч в два раза. Акцент на внешнюю часть груди. Спина прямая, таз не провисает.',
        'Подтягивания широким': 'Максимально широкий хват. Локти смотрят в стороны. Для расширения спины.',
        'Выпады': 'Шаг вперед, колено задней ноги почти касается пола. Угол в коленях 90 градусов. Держи спину ровно.',
        'Подтягивания (МАКС)': 'Тут нет счета. Делай столько раз, пока пальцы не разожмутся. Это проверка твоего предела.',
        'Пресс (на турнике)': 'Висишь на турнике, поднимаешь прямые ноги выше уровня пояса. Если тяжело — поднимай колени к груди.',
        'Приседания': 'Классика. Пятки не отрывай. Спина прямая. Садись глубоко.'
    };

    const program = {
        0: { name: 'Воскр.', rest: true, ex: [] },
        1: { name: 'Понед.', rest: false, ex: [
            { n: 'Подтягивания (Классика)', r: '4 x 10', s: 4 },
            { n: 'Обратный хват (Бицепс)', r: '3 x 10', s: 3 },
            { n: 'Алмазные отжимания', r: '3 x 15', s: 3 },
            { n: 'Взрывные приседания', r: '4 x 20', s: 4 }
        ]},
        2: { name: 'Вторник', rest: true, ex: [] },
        3: { name: 'Среда', rest: false, ex: [
            { n: 'Отжимания (Ноги выше)', r: '4 x 15', s: 4 },
            { n: 'Широкие отжимания', r: '3 x 20', s: 3 },
            { n: 'Подтягивания широким', r: '3 x 8', s: 3 },
            { n: 'Выпады', r: '3 x 12', s: 3 }
        ]},
        4: { name: 'Четверг', rest: true, ex: [] },
        5: { name: 'Пятница', rest: false, ex: [
            { n: 'Подтягивания (Классика)', r: '4 x 10', s: 4 },
            { n: 'Обратный хват (Бицепс)', r: '3 x 10', s: 3 },
            { n: 'Алмазные отжимания', r: '3 x 15', s: 3 },
            { n: 'Взрывные приседания', r: '4 x 20', s: 4 }
        ]},
        6: { name: 'Суббота', rest: false, ex: [
            { n: 'Подтягивания (МАКС)', r: '3 подх.', s: 3 },
            { n: 'Отжимания (Ноги выше)', r: '4 x 15', s: 4 },
            { n: 'Алмазные отжимания', r: '3 x 12', s: 3 },
            { n: 'Пресс (на турнике)', r: '4 x 12', s: 4 },
            { n: 'Приседания', r: '4 x 25', s: 4 }
        ]}
    };

    let state = JSON.parse(localStorage.getItem('ghostline_v3')) || {
        streak: 0, lastDate: null, water: 0, completedToday: false,
        vitamins: false, creatine: false, doneSets: {}
    };

    function getDaysToSummer() {
        const now = new Date();
        const currentYear = now.getFullYear();
        let summer = new Date(currentYear, 5, 1); // 1 Июня (месяц 5, т.к. отсчет с 0)
        
        // Если уже лето, пишем ЛЕТО
        if (now.getMonth() === 5 || now.getMonth() === 6 || now.getMonth() === 7) return "ЛЕТО!";
        // Если осень/зима, считаем до следующего года
        if (now.getMonth() > 7) summer = new Date(currentYear + 1, 5, 1);
        
        const diff = summer - now;
        return Math.ceil(diff / (1000 * 60 * 60 * 24));
    }

    function init() {
        const now = new Date();
        const dayIdx = now.getDay();
        const dateStr = now.toLocaleDateString('ru-RU');

        if (state.lastDate !== dateStr) {
            state.lastDate = dateStr;
            state.water = 0;
            state.completedToday = false;
            state.vitamins = false;
            state.creatine = false;
            state.doneSets = {};
            save();
        }

        document.getElementById('streak').innerText = state.streak;
        document.getElementById('today-name').innerText = program[dayIdx].name;
        document.getElementById('days-to-summer').innerText = getDaysToSummer();
        
        renderWorkout(dayIdx);
        renderWater();
        updateSuppsUI();
        updateProgress();
    }

    function renderWorkout(idx) {
        const area = document.getElementById('workout-area');
        const day = program[idx];

        if (day.rest) {
            area.innerHTML = `<div style="text-align:center; padding: 20px;">
                <h2 style="color: var(--success)">ОТДЫХ</h2>
                <p style="color: var(--dim)">Сегодня только витамины и еда. Мышцы строятся сейчас.</p>
            </div>`;
            return;
        }

        area.innerHTML = day.ex.map((e, eIdx) => `
            <div class="exercise">
                <div class="ex-info">
                    <div class="ex-name-row">
                        <span class="ex-name">${e.n}</span>
                        <div class="help-btn" onclick="toggleDesc(${eIdx})">?</div>
                    </div>
                    <span class="ex-reps">${e.r}</span>
                </div>
                <div class="desc-box" id="desc-${eIdx}">${descriptions[e.n] || 'Просто делай красиво!'}</div>
                <div class="sets-row">
                    ${Array(e.s).fill(0).map((_, sIdx) => {
                        const setId = `${eIdx}-${sIdx}`;
                        const isDone = state.doneSets[setId];
                        return `<div class="set-btn ${isDone ? 'done' : ''}" onclick="toggleSet(this, '${setId}')">${sIdx+1}</div>`;
                    }).join('')}
                </div>
            </div>
        `).join('');
    }

    function toggleDesc(id) {
        const el = document.getElementById(`desc-${id}`);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function toggleSet(btn, setId) {
        btn.classList.toggle('done');
        state.doneSets[setId] = btn.classList.contains('done');
        save();
        updateProgress();
    }

    function updateProgress() {
        const day = program[new Date().getDay()];
        if (day.rest) return;
        const total = day.ex.reduce((acc, e) => acc + e.s, 0);
        const done = Object.values(state.doneSets).filter(v => v).length;
        const pct = Math.round((done / total) * 100);
        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('progress-text').innerText = pct + '%';
    }

    function renderWater() {
        const grid = document.getElementById('water-grid');
        grid.innerHTML = '';
        for (let i = 0; i < 16; i++) {
            const glass = document.createElement('div');
            glass.className = 'glass' + (i < state.water ? ' full' : '');
            glass.onclick = () => { state.water = i + 1; save(); renderWater(); };
            grid.appendChild(glass);
        }
    }

    function toggleSupp(type) {
        state[type] = !state[type];
        save();
        updateSuppsUI();
    }

    function updateSuppsUI() {
        document.getElementById('check-vitamins').className = 'supp-check' + (state.vitamins ? ' active' : '');
        document.getElementById('check-creatine').className = 'supp-check' + (state.creatine ? ' active' : '');
    }

    function finishWorkout() {
        if (!state.creatine) {
            alert("А креатин? После тренировки — это обязательно!");
            return;
        }
        if (state.completedToday) return;
        state.streak++;
        state.completedToday = true;
        save();
        location.reload();
    }

    function save() { localStorage.setItem('ghostline_v3', JSON.stringify(state)); }

    init();
</script>
</body>
</html>
